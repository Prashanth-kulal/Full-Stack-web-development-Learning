<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript</title>
  <style>
    .container{
      padding:10px;
      background-color: aqua;
      margin:3px 0;
    }
    .bg-primary{
      background-color: blue;
    }
    .color-text{
      color: white;
    }
  </style>
</head>
<body>
  <h1>JavaScript tutorial</h1>
  <div id="firstContainer" class="container">
    <button id="click">
      click me
    </button>
    <p>
      This is the best paragraph which i am adding now
    </p>
  </div>
  <div class="container">
    <p>this is paragraph</p>
  </div>

  <script>
    let elem=document.getElementById("firstContainer")
    console.log(elem);

    let elemClass=document.getElementsByClassName("container")
    console.log(elemClass[1]);
    // elemClass[0].style.background="red";
    elemClass[0].classList.add("bg-primary")
    elemClass[0].classList.add("color-text")

    console.log(elem.innerHTML)
    console.log(elem.innerText)


    tn=document.getElementsByTagName('div')
    console.log(tn);

    createdElement=document.createElement('p')
    createdElement.innerText="This is created element";
    tn[1].appendChild(createdElement);

    createdElement1=document.createElement('b')
    createdElement1.innerText="This is created bold"
    tn[1].replaceChild(createdElement1,createdElement);

    query=document.querySelector('.container')
    console.log(query);

    query1=document.querySelectorAll('.container')
    console.log(query1);

  </script>
</body>

</html>
