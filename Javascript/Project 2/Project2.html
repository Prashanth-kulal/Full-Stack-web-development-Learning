<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <title>TODOs List</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <a class="navbar-brand" href="#">TODOs List</a>
    </nav>

    <div class="container">
      <h2 class="text-center">TODOs List</h2>
    </div>

    <div class="container">
      <div class="mb-3">
        <label class="form-label">Task</label>
        <input type="text" class="form-control" id="text" />
        <div class="form-text">Enter your task here.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="3"></textarea>
      </div>
      <button type="submit" id="add" class="btn btn-primary">Submit</button>
    </div>

    <div class="container my-4">
      <h3>List of the task</h3>
      <table class="table">
        <thead>
          <tr>
            <th scope="col">SL NO</th>
            <th scope="col">Task</th>
            <th scope="col">Description</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <script>
      function update() {
        let text = document.getElementById("text").value;
        let description = document.getElementById("description").value;
        let itemsJsonArray = [];

        if (localStorage.getItem("itemsJson") == null) {
          itemsJsonArray.push([text, description]);
          localStorage.setItem("itemsJson", JSON.stringify(itemsJsonArray));
        } else {
          let itemsJsonArraystr = localStorage.getItem("itemsJson");
          itemsJsonArray = JSON.parse(itemsJsonArraystr);
          itemsJsonArray.push([text, description]);
          localStorage.setItem("itemsJson", JSON.stringify(itemsJsonArray));
        }

        // populate the table
        let tableBody = document.getElementById("tableBody");
        let str = "";
        itemsJsonArray.forEach((element, index) => {
          str += `
          <tr>
            <th scope="row">${index + 1}</th>
            <td>${element[0]}</td>
            <td>${element[1]}</td>
            <td>
              <button class="btn btn-sm btn-danger" onclick="deleteItem(${index})">Delete</button>
            </td>
          </tr>`;
        });
        tableBody.innerHTML = str;
      }

      function deleteItem(index) {
        let itemsJsonArraystr = localStorage.getItem("itemsJson");
        let itemsJsonArray = JSON.parse(itemsJsonArraystr);
        itemsJsonArray.splice(index, 1);
        localStorage.setItem("itemsJson", JSON.stringify(itemsJsonArray));
        renderTable();
      }

      function renderTable() {
        let itemsJsonArraystr = localStorage.getItem("itemsJson");
        let itemsJsonArray = JSON.parse(itemsJsonArraystr) || [];
        let tableBody = document.getElementById("tableBody");
        let str = "";
        itemsJsonArray.forEach((element, index) => {
          str += `
          <tr>
            <th scope="row">${index + 1}</th>
            <td>${element[0]}</td>
            <td>${element[1]}</td>
            <td>
              <button class="btn btn-sm btn-danger" onclick="deleteItem(${index})">Delete</button>
            </td>
          </tr>`;
        });
        tableBody.innerHTML = str;
      }

      document.getElementById("add").addEventListener("click", update);
      renderTable(); // initial load
    </script>
  </body>
</html>
